<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0B0C0E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GO TODO">
    
    <link rel="manifest" href="/todo-app/manifest.json">
    <link rel="apple-touch-icon" href="/todo-app/icon-192.png">
    
    <title>GO TODO — задачи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0B0C0E;
            font-family: -apple-system, 'Inter', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .app {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        
        .card {
            background: #121316;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .titleMain {
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
            margin: 0 0 16px 0;
            color: #D4AF37;
        }
        
        .nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        
        .nav-btn {
            background: #1A1B1F;
            border: 1px solid #2A2B30;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #FFFFFF;
            cursor: pointer;
            font-family: inherit;
        }
        
        .nav-btn:active {
            background: #2A2B30;
            transform: scale(0.96);
        }
        
        .date-badge {
            background: #2A2B30;
            border: 1px solid #D4AF37;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #D4AF37;
            cursor: pointer;
            font-family: inherit;
        }
        
        .date-badge:active {
            background: #3A3B40;
            transform: scale(0.96);
        }
        
        #datePicker {
            display: none;
        }
        
        .stats {
            background: #1A1B1F;
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.04);
            overflow: hidden;
        }
        
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            background: #1A1B1F;
            transition: background 0.15s;
        }
        
        .stats-header:active {
            background: #222328;
        }
        
        .stats-header h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #8E8E92;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .stats-arrow {
            font-size: 1rem;
            color: #D4AF37;
            transition: transform 0.2s;
        }
        
        .stats-arrow.collapsed {
            transform: rotate(-90deg);
        }
        
        .stats-content {
            padding: 0 16px 16px 16px;
            transition: all 0.2s;
        }
        
        .stats-content.collapsed {
            display: none;
        }
        
        .statRow {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            color: #FFFFFF;
        }
        
        .statRow span:first-child {
            color: #8E8E92;
        }
        
        .statRow b {
            color: #D4AF37;
            font-weight: 600;
        }
        
        .progress-section {
            margin-bottom: 16px;
        }
        
        .progress {
            height: 6px;
            background: #26272D;
            border-radius: 100px;
            overflow: hidden;
        }
        
        .progress div {
            height: 100%;
            width: 0%;
            background: #D4AF37;
            border-radius: 100px;
            transition: width 0.3s ease;
        }
        
        .btn-info {
            background: none;
            border: 0.5px solid #2D2E35;
            color: #B0B0B8;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-info:active {
            background: rgba(255,255,255,0.05);
            transform: scale(0.98);
        }
        
        .sectionBox {
            background: #1A1B1F;
            border-radius: 24px;
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            background: #1A1B1F;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .section-header:active {
            background: #222328;
        }
        
        .section-header .left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }
        
        .section-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #FFFFFF;
        }
        
        .statusBox {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 40px;
            background: rgba(212,175,55,0.15);
            color: #D4AF37;
            font-weight: 500;
        }
        
        .section-arrow {
            font-size: 1rem;
            color: #D4AF37;
            transition: transform 0.2s;
        }
        
        .section-arrow.collapsed {
            transform: rotate(-90deg);
        }
        
        .sectionContent {
            padding: 10px;
        }
        
        .task-card {
            background: #0F1013;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border: 0.5px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: background 0.1s;
        }
        
        .task-card:active {
            background: #16171C;
        }
        
        .task-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            pointer-events: none;
        }
        
        .check-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1A1B1F;
            border: 1px solid #2A2B30;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            pointer-events: auto;
        }
        
        .check-btn.done {
            background: #D4AF37;
            border-color: #D4AF37;
        }
        
        .check-btn svg {
            stroke: #FFFFFF;
        }
        
        .check-btn.done svg {
            stroke: #0B0C0E;
        }
        
        .check-btn:active {
            transform: scale(0.94);
        }
        
        .task-info {
            flex: 1;
            min-width: 0;
            pointer-events: none;
        }
        
        .task-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: #FFFFFF;
            word-break: break-word;
            margin-bottom: 4px;
        }
        
        .task-title.done {
            text-decoration: line-through;
            color: #5E5E68;
        }
        
        .task-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .period {
            font-size: 0.65rem;
            color: #8E8E92;
        }
        
        .badge {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 40px;
            background: rgba(212,175,55,0.1);
            color: #D4AF37;
        }
        
        .task-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            pointer-events: auto;
        }
        
        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            background: #1A1B1F;
            border: 1px solid #2A2B30;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .action-btn:active {
            background: #2A2B30;
            transform: scale(0.94);
        }
        
        .action-btn svg {
            stroke: #8E8E92;
        }
        
        .accordion {
            margin-top: 16px;
        }
        
        .accordion-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #1A1B1F;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            color: #FFFFFF;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }
        
        .accordion-btn:active {
            background: #222328;
        }
        
        .accordion-arrow {
            font-size: 1.1rem;
            color: #D4AF37;
        }
        
        .accordion-content {
            display: none;
            margin-top: 10px;
            padding: 16px;
            background: #1A1B1F;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .form-row-compact {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }
        
        input, select {
            width: 100%;
            background: #0F1013;
            border: 1px solid #2A2B30;
            border-radius: 18px;
            padding: 12px 14px;
            font-size: 0.9rem;
            color: #FFFFFF;
            font-family: inherit;
            outline: none;
        }
        
        input:focus, select:focus {
            border-color: #D4AF37;
        }
        
        .weekdays {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        
        .weekdays label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #FFFFFF;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .weekdays input {
            width: auto;
            margin: 0;
        }
        
        .add-btn {
            background: #D4AF37;
            border: none;
            border-radius: 28px;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #0B0C0E;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }
        
        .add-btn:active {
            background: #E5C252;
            transform: scale(0.97);
        }
        
        .empty-message {
            text-align: center;
            padding: 24px 16px;
            color: #5E5E68;
            font-size: 0.8rem;
        }
        
        footer {
            font-size: 0.6rem;
            color: #484850;
            text-align: center;
            margin-top: 16px;
            padding-bottom: 6px;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6);
            cursor: pointer;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #18191E;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3A3B42;
            border-radius: 10px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <h1 class="titleMain">GO TODO</h1>
        
        <div class="nav">
            <button class="nav-btn" onclick="window.changeDay(-1)">← Вчера</button>
            <button class="nav-btn" onclick="window.goToday()">Сегодня</button>
            <button class="nav-btn" onclick="window.changeDay(1)">Завтра →</button>
            <button class="date-badge" onclick="window.openDatePicker()">
                <span id="dateText">Дата</span>
            </button>
            <input type="date" id="datePicker" onchange="window.selectDate(this.value)">
        </div>
        
        <div class="stats" id="statsBlock">
            <div class="stats-header" onclick="window.toggleStats()">
                <h3>СТАТИСТИКА</h3>
                <span class="stats-arrow" id="statsArrow">▼</span>
            </div>
            <div class="stats-content" id="statsContent">
                <div class="statRow"><span>Всего задач:</span><b id="totalTasks">0</b></div>
                <div class="statRow"><span>Выполнено:</span><b id="doneTasks">0</b></div>
                <div class="statRow"><span>Прогресс:</span><b id="progress">0%</b></div>
                <button class="btn-info" onclick="window.toggleAllPeriods()">Показать даты</button>
            </div>
        </div>
        
        <div class="progress-section">
            <div class="progress"><div id="progressBar"></div></div>
        </div>
        
        <div id="todaySection"></div>
        <div id="dailySection"></div>
        <div id="remindSection"></div>
        
        <div class="accordion">
            <button class="accordion-btn" onclick="window.toggleAddSection()">
                <span>Добавить задачу</span>
                <span class="accordion-arrow" id="accordionArrow">+</span>
            </button>
            <div class="accordion-content" id="addSection">
                <div class="form-row-compact">
                    <input id="title" placeholder="Название дела">
                    <select id="type">
                        <option value="today">Задача на сегодня</option>
                        <option value="daily">Постоянная (каждый день)</option>
                        <option value="remind">Напоминание</option>
                    </select>
                </div>
                
                <div id="dailyDatesBlock" style="display:none;">
                    <div class="form-row-compact">
                        <input type="date" id="startDate" placeholder="Дата начала">
                        <input type="date" id="endDate" placeholder="Дата конца">
                    </div>
                </div>
                
                <div id="remindBlock" style="display:none;">
                    <div class="form-row-compact">
                        <select id="remindSubtype">
                            <option value="every">Раз в N дней</option>
                            <option value="weekdays">По дням недели</option>
                            <option value="specific">Конкретный день</option>
                        </select>
                    </div>
                    
                    <div id="remindEveryBlock">
                        <div class="form-row-compact">
                            <input type="date" id="remindStart" placeholder="Дата старта">
                            <input type="number" id="remindEvery" min="1" value="3" placeholder="Раз в N дней">
                        </div>
                    </div>
                    
                    <div id="remindWeekdaysBlock" style="display:none;">
                        <div class="form-row-compact">
                            <input type="date" id="remindWeekdaysStart" placeholder="Дата старта (опционально)">
                        </div>
                        <div class="weekdays">
                            <label><input type="checkbox" value="1"> Пн</label>
                            <label><input type="checkbox" value="2"> Вт</label>
                            <label><input type="checkbox" value="3"> Ср</label>
                            <label><input type="checkbox" value="4"> Чт</label>
                            <label><input type="checkbox" value="5"> Пт</label>
                            <label><input type="checkbox" value="6"> Сб</label>
                            <label><input type="checkbox" value="0"> Вс</label>
                        </div>
                    </div>
                    
                    <div id="remindSpecificBlock" style="display:none;">
                        <div class="form-row-compact">
                            <input type="date" id="remindSpecificDate" placeholder="Дата напоминания">
                        </div>
                    </div>
                </div>
                
                <button class="add-btn" onclick="window.addTask()">Добавить</button>
            </div>
        </div>
        
        <footer>LocalStorage • данные сохраняются на вашем устройстве</footer>
    </div>
</div>

<script>
    const todaySection = document.getElementById("todaySection");
    const dailySection = document.getElementById("dailySection");
    const remindSection = document.getElementById("remindSection");
    const typeSelect = document.getElementById("type");
    const dailyDatesBlock = document.getElementById("dailyDatesBlock");
    const remindBlock = document.getElementById("remindBlock");
    const remindSubtype = document.getElementById("remindSubtype");
    const remindEveryBlock = document.getElementById("remindEveryBlock");
    const remindWeekdaysBlock = document.getElementById("remindWeekdaysBlock");
    const remindSpecificBlock = document.getElementById("remindSpecificBlock");
    const viewDateDisplay = document.getElementById("dateText");
    const datePicker = document.getElementById("datePicker");
    const totalTasksEl = document.getElementById("totalTasks");
    const doneTasksEl = document.getElementById("doneTasks");
    const progressEl = document.getElementById("progress");
    const progressBarEl = document.getElementById("progressBar");
    
    let viewDate = getMskToday();
    let sectionsState = { today: false, daily: false, remind: false };
    let statsCollapsed = false;
    
    function getMskToday() {
        const formatter = new Intl.DateTimeFormat("ru-RU", {
            timeZone: "Europe/Moscow",
            year: "numeric",
            month: "2-digit",
            day: "2-digit"
        });
        const parts = formatter.formatToParts(new Date());
        const day = parts.find(p => p.type === "day").value;
        const month = parts.find(p => p.type === "month").value;
        const year = parts.find(p => p.type === "year").value;
        return `${year}-${month}-${day}`;
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return "";
        const [y, m, d] = dateStr.split("-");
        return `${d}.${m}.${y}`;
    }
    
    function prevDate(dateStr) {
        const d = new Date(dateStr + "T00:00:00");
        d.setDate(d.getDate() - 1);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
    }
    
    function loadTasks() {
        return JSON.parse(localStorage.getItem("tasks") || "[]");
    }
    
    function saveTasks(tasks) {
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }
    
    function loadSectionsState() {
        const saved = localStorage.getItem("sectionsState");
        if (saved) sectionsState = JSON.parse(saved);
        const savedStats = localStorage.getItem("statsCollapsed");
        if (savedStats !== null) statsCollapsed = savedStats === "true";
        applyStatsState();
    }
    
    function saveSectionsState() {
        localStorage.setItem("sectionsState", JSON.stringify(sectionsState));
        localStorage.setItem("statsCollapsed", statsCollapsed);
    }
    
    function applyStatsState() {
        const content = document.getElementById("statsContent");
        const arrow = document.getElementById("statsArrow");
        if (statsCollapsed) {
            content.classList.add("collapsed");
            arrow.classList.add("collapsed");
        } else {
            content.classList.remove("collapsed");
            arrow.classList.remove("collapsed");
        }
    }
    
    window.toggleStats = function() {
        statsCollapsed = !statsCollapsed;
        applyStatsState();
        saveSectionsState();
    };
    
    function isTaskForDay(task, day) {
        if (task.type === "today") return task.date === day;
        if (task.type === "daily") return day >= task.startDate && day <= task.endDate;
        if (task.type === "remind") return isReminderActive(task, day);
        return false;
    }
    
    function isReminderActive(task, day) {
        if (task.remindMode === "every") {
            const start = new Date(task.startDate + "T00:00:00");
            const current = new Date(day + "T00:00:00");
            const diff = Math.floor((current - start) / (1000 * 60 * 60 * 24));
            return diff >= 0 && diff % task.every === 0;
        }
        if (task.remindMode === "weekdays") {
            if (task.startDate && day < task.startDate) return false;
            const d = new Date(day + "T00:00:00");
            const weekday = d.getDay();
            return task.weekdays && task.weekdays.includes(weekday);
        }
        if (task.remindMode === "specific") {
            return task.specificDate === day;
        }
        return false;
    }
    
    function isCompleted(task, day) {
        return task.completedDates && task.completedDates.includes(day);
    }
    
    function calculateStreak(task, day) {
        if (task.type !== "daily") return 0;
        let streak = 0;
        let d = day;
        while (d >= task.startDate) {
            if (!isCompleted(task, d)) break;
            streak++;
            d = prevDate(d);
        }
        return streak;
    }
    
    window.toggleAllPeriods = function() {
        const tasks = loadTasks();
        const allVisible = localStorage.getItem("allDatesVisible") === "true";
        tasks.forEach(t => {
            if (t.type === "daily") t.showPeriod = !allVisible;
        });
        localStorage.setItem("allDatesVisible", !allVisible);
        localStorage.setItem("datePeriodShownDate", getMskToday());
        saveTasks(tasks);
        render();
    };
    
    window.addTask = function() {
        const title = document.getElementById("title").value.trim();
        const type = typeSelect.value;
        if (!title) {
            alert("Введите название задачи");
            return;
        }
        
        const task = {
            id: Date.now(),
            title,
            type,
            completedDates: [],
            showPeriod: false
        };
        
        if (type === "today") {
            task.date = getMskToday();
        }
        
        if (type === "daily") {
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;
            if (!start || !end) {
                alert("Укажите даты начала и конца");
                return;
            }
            task.startDate = start;
            task.endDate = end;
        }
        
        if (type === "remind") {
            const remindMode = remindSubtype.value;
            task.remindMode = remindMode;
            
            if (remindMode === "every") {
                const start = document.getElementById("remindStart").value;
                const every = Number(document.getElementById("remindEvery").value);
                if (!start) {
                    alert("Укажите дату старта");
                    return;
                }
                if (!every || every < 1) {
                    alert("Укажите частоту");
                    return;
                }
                task.startDate = start;
                task.every = every;
            }
            else if (remindMode === "weekdays") {
                const start = document.getElementById("remindWeekdaysStart").value;
                const days = Array.from(document.querySelectorAll("#remindWeekdaysBlock input:checked"))
                    .map(ch => Number(ch.value));
                if (days.length === 0) {
                    alert("Выберите хотя бы один день недели");
                    return;
                }
                if (start) task.startDate = start;
                task.weekdays = days;
            }
            else if (remindMode === "specific") {
                const specificDate = document.getElementById("remindSpecificDate").value;
                if (!specificDate) {
                    alert("Выберите дату");
                    return;
                }
                task.specificDate = specificDate;
            }
        }
        
        const tasks = loadTasks();
        tasks.push(task);
        saveTasks(tasks);
        
        document.getElementById("title").value = "";
        if (addSection.style.display === "block") {
            addSection.style.display = "none";
            document.getElementById("accordionArrow").textContent = "+";
        }
        render();
    };
    
    window.toggleTask = function(id) {
        const tasks = loadTasks();
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        
        if (isCompleted(task, viewDate)) {
            task.completedDates = task.completedDates.filter(d => d !== viewDate);
        } else {
            task.completedDates.push(viewDate);
        }
        saveTasks(tasks);
        render();
    };
    
    window.deleteTask = function(id) {
        if (confirm("Удалить задачу?")) {
            const tasks = loadTasks().filter(t => t.id !== id);
            saveTasks(tasks);
            render();
        }
    };
    
    window.editTask = function(id) {
        const tasks = loadTasks();
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        
        const newTitle = prompt("Новое название:", task.title);
        if (newTitle !== null && newTitle.trim()) task.title = newTitle.trim();
        
        if (task.type === "today") {
            const newDate = prompt("Новая дата (ГГГГ-ММ-ДД):", task.date);
            if (newDate) task.date = newDate;
        }
        
        if (task.type === "daily") {
            const newStart = prompt("Новая дата начала:", task.startDate);
            const newEnd = prompt("Новая дата конца:", task.endDate);
            if (newStart) task.startDate = newStart;
            if (newEnd) task.endDate = newEnd;
        }
        
        if (task.type === "remind") {
            if (task.remindMode === "every") {
                const newStart = prompt("Новая дата старта:", task.startDate);
                const newEvery = prompt("Новая частота (дней):", task.every);
                if (newStart) task.startDate = newStart;
                if (newEvery) task.every = Number(newEvery);
            }
            else if (task.remindMode === "weekdays") {
                const newStart = prompt("Новая дата старта (оставьте пустым):", task.startDate || "");
                if (newStart !== null && newStart !== "") task.startDate = newStart;
                const newDays = prompt("Дни недели (0-вс,1-пн... через запятую):", task.weekdays.join(","));
                if (newDays) task.weekdays = newDays.split(",").map(x => Number(x.trim()));
            }
            else if (task.remindMode === "specific") {
                const newDate = prompt("Новая дата:", task.specificDate);
                if (newDate) task.specificDate = newDate;
            }
        }
        
        saveTasks(tasks);
        render();
    };
    
    function getTaskPeriodText(task) {
        if (task.type === "today") {
            return formatDate(task.date);
        }
        if (task.type === "daily") {
            return `${formatDate(task.startDate)} – ${formatDate(task.endDate)}`;
        }
        if (task.type === "remind") {
            if (task.remindMode === "every") {
                return `Каждые ${task.every} дн. с ${formatDate(task.startDate)}`;
            }
            if (task.remindMode === "weekdays") {
                const names = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
                const daysStr = task.weekdays.map(d => names[d]).join(", ");
                const startInfo = task.startDate ? ` с ${formatDate(task.startDate)}` : "";
                return `${daysStr}${startInfo}`;
            }
            if (task.remindMode === "specific") {
                return formatDate(task.specificDate);
            }
        }
        return "";
    }
    
    function renderTask(task) {
        const done = isCompleted(task, viewDate);
        const taskDiv = document.createElement("div");
        taskDiv.className = "task-card";
        taskDiv.setAttribute("data-id", task.id);
        
        const periodText = getTaskPeriodText(task);
        const streak = calculateStreak(task, viewDate);
        const showPeriod = task.type === "daily" ? task.showPeriod : true;
        
        taskDiv.innerHTML = `
            <div class="task-left">
                <button class="check-btn ${done ? "done" : ""}" onclick="event.stopPropagation(); window.toggleTask(${task.id})">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="task-info">
                    <div class="task-title ${done ? "done" : ""}">${escapeHtml(task.title)}</div>
                    <div class="task-meta">
                        <span class="period" style="${showPeriod ? "" : "display:none"}">${periodText}</span>
                        ${streak > 0 ? `<span class="badge">стрик ${streak}</span>` : ""}
                    </div>
                </div>
            </div>
            <div class="task-actions">
                <button class="action-btn" onclick="event.stopPropagation(); window.editTask(${task.id})">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M3 21h4l12-12-4-4L3 17v4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M14 6l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="action-btn" onclick="event.stopPropagation(); window.deleteTask(${task.id})">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M6 6L18 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        `;
        
        taskDiv.addEventListener("click", (e) => {
            if (e.target.closest(".action-btn")) return;
            if (e.target.closest(".check-btn")) return;
            window.toggleTask(task.id);
        });
        
        return taskDiv;
    }
    
    function renderSection(section, title, tasks) {
        const total = tasks.length;
        const done = tasks.filter(t => isCompleted(t, viewDate)).length;
        const isCollapsed = sectionsState[section];
        
        const box = document.createElement("div");
        box.className = "sectionBox";
        
        box.innerHTML = `
            <div class="section-header" data-section="${section}">
                <div class="left">
                    <h3>${title}</h3>
                    <div class="statusBox">${done}/${total} выполнено</div>
                </div>
                <span class="section-arrow ${isCollapsed ? "collapsed" : ""}">${isCollapsed ? "▶" : "▼"}</span>
            </div>
            <div class="sectionContent" style="display: ${isCollapsed ? "none" : "block"}"></div>
        `;
        
        const content = box.querySelector(".sectionContent");
        tasks.forEach(t => content.appendChild(renderTask(t)));
        
        const header = box.querySelector(".section-header");
        header.addEventListener("click", (e) => {
            sectionsState[section] = !sectionsState[section];
            saveSectionsState();
            render();
        });
        
        return box;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }
    
    function render() {
        loadSectionsState();
        
        viewDateDisplay.textContent = formatDate(viewDate);
        datePicker.value = viewDate;
        
        const tasks = loadTasks();
        const todayTasks = tasks.filter(t => t.type === "today" && isTaskForDay(t, viewDate));
        const dailyTasks = tasks.filter(t => t.type === "daily" && isTaskForDay(t, viewDate));
        const remindTasks = tasks.filter(t => t.type === "remind" && isTaskForDay(t, viewDate));
        
        const total = todayTasks.length + dailyTasks.length + remindTasks.length;
        const done = tasks.filter(t => isTaskForDay(t, viewDate) && isCompleted(t, viewDate)).length;
        const percent = total === 0 ? 0 : Math.round((done / total) * 100);
        
        totalTasksEl.textContent = total;
        doneTasksEl.textContent = done;
        progressEl.textContent = `${percent}%`;
        progressBarEl.style.width = `${percent}%`;
        
        todaySection.innerHTML = "";
        dailySection.innerHTML = "";
        remindSection.innerHTML = "";
        
        if (todayTasks.length) todaySection.appendChild(renderSection("today", "Задачи на сегодня", todayTasks));
        if (dailyTasks.length) dailySection.appendChild(renderSection("daily", "Постоянные (каждый день)", dailyTasks));
        if (remindTasks.length) remindSection.appendChild(renderSection("remind", "Напоминания", remindTasks));
        
        if (total === 0) {
            const emptyDiv = document.createElement("div");
            emptyDiv.className = "empty-message";
            emptyDiv.textContent = "На этот день задач нет";
            dailySection.appendChild(emptyDiv);
        }
    }
    
    window.changeDay = function(delta) {
        const d = new Date(viewDate + "T00:00:00");
        d.setDate(d.getDate() + delta);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        viewDate = `${y}-${m}-${day}`;
        render();
    };
    
    window.goToday = function() {
        viewDate = getMskToday();
        render();
    };
    
    window.openDatePicker = function() {
        if (datePicker.showPicker) {
            datePicker.showPicker();
        } else {
            datePicker.click();
        }
    };
    
    window.selectDate = function(value) {
        if (value) {
            viewDate = value;
            render();
        }
    };
    
    window.toggleAddSection = function() {
        const addSectionEl = document.getElementById("addSection");
        const arrow = document.getElementById("accordionArrow");
        if (addSectionEl.style.display === "block") {
            addSectionEl.style.display = "none";
            arrow.textContent = "+";
        } else {
            addSectionEl.style.display = "block";
            arrow.textContent = "−";
        }
    };
    
    typeSelect.addEventListener("change", () => {
        const type = typeSelect.value;
        dailyDatesBlock.style.display = type === "daily" ? "block" : "none";
        remindBlock.style.display = type === "remind" ? "block" : "none";
    });
    
    remindSubtype.addEventListener("change", () => {
        const mode = remindSubtype.value;
        remindEveryBlock.style.display = mode === "every" ? "block" : "none";
        remindWeekdaysBlock.style.display = mode === "weekdays" ? "block" : "none";
        remindSpecificBlock.style.display = mode === "specific" ? "block" : "none";
        
        if (mode === "every") {
            document.getElementById("remindStart").value = getMskToday();
        }
        if (mode === "specific") {
            document.getElementById("remindSpecificDate").value = getMskToday();
        }
    });
    
    document.getElementById("remindStart").value = getMskToday();
    document.getElementById("remindSpecificDate").value = getMskToday();
    
    render();
    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/todo-app/sw.js')
            .then(() => console.log('SW registered'))
            .catch(err => console.log('SW error:', err));
    }
</script>
</body>
</html>
