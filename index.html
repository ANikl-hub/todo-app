<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0B0C0E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GO TODO">
    
    <title>GO TODO — задачи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0B0C0E;
            font-family: -apple-system, 'Inter', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            letter-spacing: -0.01em;
        }
        
        .app {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        
        .card {
            background: #121316;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .titleMain {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-align: center;
            margin: 0 0 20px 0;
            color: #D4AF37;
        }
        
        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 500;
            color: #8E8E92;
            margin-bottom: 6px;
        }
        
        .nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .nav button, .dateBtn {
            background: #1A1B1F;
            border: 1px solid #2A2B30;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        
        .nav button:active, .dateBtn:active {
            background: #2A2B30;
            transform: scale(0.96);
        }
        
        .dateBtn {
            background: #2A2B30;
            border-color: #D4AF37;
            color: #D4AF37;
        }
        
        #datePicker {
            display: none;
        }
        
        .stats {
            background: #1A1B1F;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .statRow {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.9rem;
            color: #FFFFFF;
        }
        
        .statRow span:first-child {
            color: #8E8E92;
        }
        
        .statRow b {
            color: #D4AF37;
            font-weight: 600;
        }
        
        .progress {
            margin-top: 12px;
            height: 6px;
            background: #26272D;
            border-radius: 100px;
            overflow: hidden;
        }
        
        .progress div {
            height: 100%;
            width: 0%;
            background: #D4AF37;
            border-radius: 100px;
            transition: width 0.3s ease;
        }
        
        .btn-info {
            background: none;
            border: 0.5px solid #2D2E35;
            color: #B0B0B8;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 12px;
            width: 100%;
        }
        
        .btn-info:active {
            background: rgba(255,255,255,0.05);
            transform: scale(0.98);
        }
        
        .sectionBox {
            background: #1A1B1F;
            border-radius: 24px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .sectionHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .sectionHeader .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .sectionHeader h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #FFFFFF;
        }
        
        .statusBox {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            background: rgba(212,175,55,0.15);
            color: #D4AF37;
            font-weight: 500;
        }
        
        .toggle {
            background: none;
            border: 0.5px solid #2D2E35;
            color: #B0B0B8;
            font-size: 0.7rem;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .toggle:active {
            background: rgba(255,255,255,0.05);
        }
        
        .sectionContent {
            padding: 12px;
        }
        
        .task-card {
            background: #0F1013;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border: 0.5px solid rgba(255,255,255,0.04);
        }
        
        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        
        .check-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1A1B1F;
            border: 1px solid #2A2B30;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        
        .check-btn.done {
            background: #D4AF37;
            border-color: #D4AF37;
        }
        
        .check-btn svg {
            stroke: #FFFFFF;
        }
        
        .check-btn.done svg {
            stroke: #0B0C0E;
        }
        
        .check-btn:active {
            transform: scale(0.94);
        }
        
        .task-info {
            flex: 1;
            min-width: 0;
        }
        
        .task-title {
            font-size: 1rem;
            font-weight: 500;
            color: #FFFFFF;
            word-break: break-word;
            margin-bottom: 6px;
        }
        
        .task-title.done {
            text-decoration: line-through;
            color: #5E5E68;
        }
        
        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .period {
            font-size: 0.7rem;
            color: #8E8E92;
        }
        
        .badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 40px;
            background: rgba(212,175,55,0.1);
            color: #D4AF37;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 40px;
            background: #1A1B1F;
            border: 1px solid #2A2B30;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .action-btn:active {
            background: #2A2B30;
            transform: scale(0.94);
        }
        
        .action-btn svg {
            stroke: #8E8E92;
        }
        
        .accordion {
            margin-top: 20px;
        }
        
        .accordion-btn {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #1A1B1F;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            color: #FFFFFF;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .accordion-btn:active {
            background: #222328;
        }
        
        .accordion-arrow {
            font-size: 1.2rem;
            color: #D4AF37;
        }
        
        .accordion-content {
            display: none;
            margin-top: 12px;
            padding: 20px;
            background: #1A1B1F;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .form-row-compact {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        input, select {
            width: 100%;
            background: #0F1013;
            border: 1px solid #2A2B30;
            border-radius: 18px;
            padding: 14px 16px;
            font-size: 1rem;
            color: #FFFFFF;
            font-family: inherit;
            outline: none;
            transition: border 0.15s;
        }
        
        input:focus, select:focus {
            border-color: #D4AF37;
        }
        
        .weekdays {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        
        .weekdays label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #FFFFFF;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        .weekdays input {
            width: auto;
            margin: 0;
        }
        
        .add-btn {
            background: #D4AF37;
            border: none;
            border-radius: 28px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 1rem;
            color: #0B0C0E;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            margin-top: 8px;
        }
        
        .add-btn:active {
            background: #E5C252;
            transform: scale(0.97);
        }
        
        .empty-message {
            text-align: center;
            padding: 32px 20px;
            color: #5E5E68;
            font-size: 0.85rem;
        }
        
        footer {
            font-size: 0.65rem;
            color: #484850;
            text-align: center;
            margin-top: 20px;
            padding-bottom: 8px;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6);
            cursor: pointer;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #18191E;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3A3B42;
            border-radius: 10px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <h1 class="titleMain">GO TODO</h1>
        
        <div class="nav">
            <button onclick="window.changeDay(-1)">← Вчера</button>
            <button onclick="window.goToday()">Сегодня</button>
            <button onclick="window.changeDay(1)">Завтра →</button>
            <button class="dateBtn" onclick="window.openDatePicker()">
                <span id="dateText">Дата</span>
            </button>
            <input type="date" id="datePicker" onchange="window.selectDate(this.value)">
        </div>
        
        <div class="stats">
            <div class="statRow"><span>Всего задач:</span><b id="totalTasks">0</b></div>
            <div class="statRow"><span>Выполнено:</span><b id="doneTasks">0</b></div>
            <div class="statRow"><span>Прогресс:</span><b id="progress">0%</b></div>
            <div class="progress"><div id="progressBar"></div></div>
            <button class="btn-info" onclick="window.toggleAllPeriods()">📅 Показать даты</button>
        </div>
        
        <div id="onceSection"></div>
        <div id="dailySection"></div>
        <div id="remindSection"></div>
        
        <div class="accordion">
            <button class="accordion-btn" onclick="window.toggleAddSection()">
                <span>Добавить задачу</span>
                <span class="accordion-arrow" id="accordionArrow">+</span>
            </button>
            <div class="accordion-content" id="addSection">
                <div class="form-row-compact">
                    <input id="title" placeholder="Название дела">
                    <select id="type">
                        <option value="once">Внутридневная</option>
                        <option value="daily">Каждый день (от и до)</option>
                        <option value="remind">Напоминание</option>
                    </select>
                </div>
                
                <div id="dates" style="display:none;">
                    <div class="form-row-compact">
                        <input type="date" id="startDate" placeholder="Дата начала">
                        <input type="date" id="endDate" placeholder="Дата конца">
                    </div>
                </div>
                
                <div id="remind" style="display:none;">
                    <div class="form-row-compact">
                        <input type="date" id="remindStart" placeholder="Дата старта">
                        <select id="remindType">
                            <option value="every">Раз в N дней</option>
                            <option value="weekdays">По дням недели</option>
                        </select>
                    </div>
                    <div id="remindEveryBlock">
                        <input type="number" id="remindEvery" min="1" value="3" placeholder="Раз в N дней">
                    </div>
                    <div id="weekdaysBlock" style="display:none;">
                        <div class="weekdays">
                            <label><input type="checkbox" value="1"> Пн</label>
                            <label><input type="checkbox" value="2"> Вт</label>
                            <label><input type="checkbox" value="3"> Ср</label>
                            <label><input type="checkbox" value="4"> Чт</label>
                            <label><input type="checkbox" value="5"> Пт</label>
                            <label><input type="checkbox" value="6"> Сб</label>
                            <label><input type="checkbox" value="0"> Вс</label>
                        </div>
                    </div>
                </div>
                
                <button class="add-btn" onclick="window.addTask()">＋ Добавить</button>
            </div>
        </div>
        
        <footer>LocalStorage • данные сохраняются на вашем устройстве</footer>
    </div>
</div>

<script>
    // DOM элементы
    const dailySection = document.getElementById("dailySection");
    const onceSection = document.getElementById("onceSection");
    const remindSection = document.getElementById("remindSection");
    const typeSelect = document.getElementById("type");
    const datesDiv = document.getElementById("dates");
    const remindDiv = document.getElementById("remind");
    const remindType = document.getElementById("remindType");
    const remindEveryBlock = document.getElementById("remindEveryBlock");
    const weekdaysBlock = document.getElementById("weekdaysBlock");
    const viewDateDisplay = document.getElementById("dateText");
    const datePicker = document.getElementById("datePicker");
    const totalTasksEl = document.getElementById("totalTasks");
    const doneTasksEl = document.getElementById("doneTasks");
    const progressEl = document.getElementById("progress");
    const progressBarEl = document.getElementById("progressBar");
    
    let viewDate = getMskToday();
    let sectionsState = { daily: true, once: true, remind: true };
    
    // Функции дат
    function getMskToday() {
        const formatter = new Intl.DateTimeFormat("ru-RU", {
            timeZone: "Europe/Moscow",
            year: "numeric",
            month: "2-digit",
            day: "2-digit"
        });
        const parts = formatter.formatToParts(new Date());
        const day = parts.find(p => p.type === "day").value;
        const month = parts.find(p => p.type === "month").value;
        const year = parts.find(p => p.type === "year").value;
        return `${year}-${month}-${day}`;
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return "";
        const [y, m, d] = dateStr.split("-");
        return `${d}.${m}.${y}`;
    }
    
    function prevDate(dateStr) {
        const d = new Date(dateStr + "T00:00:00");
        d.setDate(d.getDate() - 1);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
    }
    
    // Работа с задачами
    function loadTasks() {
        return JSON.parse(localStorage.getItem("tasks") || "[]");
    }
    
    function saveTasks(tasks) {
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }
    
    function loadSectionsState() {
        const saved = localStorage.getItem("sectionsState");
        if (saved) sectionsState = JSON.parse(saved);
    }
    
    function saveSectionsState() {
        localStorage.setItem("sectionsState", JSON.stringify(sectionsState));
    }
    
    function isTaskForDay(task, day) {
        if (task.type === "once") return task.date === day;
        if (task.type === "daily") return day >= task.startDate && day <= task.endDate;
        if (task.type === "remind") return isReminderToday(task, day);
        return false;
    }
    
    function isReminderToday(task, day) {
        if (task.remindMode === "every") {
            const start = new Date(task.startDate + "T00:00:00");
            const current = new Date(day + "T00:00:00");
            const diff = Math.floor((current - start) / (1000 * 60 * 60 * 24));
            return diff >= 0 && diff % task.every === 0;
        }
        if (task.remindMode === "weekdays") {
            const d = new Date(day + "T00:00:00");
            const weekday = d.getDay();
            return task.weekdays && task.weekdays.includes(weekday);
        }
        return false;
    }
    
    function isCompleted(task, day) {
        return task.completedDates && task.completedDates.includes(day);
    }
    
    function calculateStreak(task, day) {
        if (task.type !== "daily") return 0;
        let streak = 0;
        let d = day;
        while (d >= task.startDate) {
            if (!isCompleted(task, d)) break;
            streak++;
            d = prevDate(d);
        }
        return streak;
    }
    
    window.toggleAllPeriods = function() {
        const tasks = loadTasks();
        const allVisible = localStorage.getItem("allDatesVisible") === "true";
        tasks.forEach(t => {
            if (t.type === "daily") t.showPeriod = !allVisible;
        });
        localStorage.setItem("allDatesVisible", !allVisible);
        localStorage.setItem("datePeriodShownDate", getMskToday());
        saveTasks(tasks);
        render();
    };
    
    window.addTask = function() {
        const title = document.getElementById("title").value.trim();
        const type = typeSelect.value;
        if (!title) return;
        
        const task = {
            id: Date.now(),
            title,
            type,
            completedDates: [],
            showPeriod: false
        };
        
        if (type === "daily") {
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;
            if (!start || !end) { alert("Укажите даты начала и конца"); return; }
            task.startDate = start;
            task.endDate = end;
        }
        
        if (type === "once") {
            task.date = viewDate;
        }
        
        if (type === "remind") {
            const start = document.getElementById("remindStart").value;
            if (!start) { alert("Укажите дату старта"); return; }
            task.startDate = start;
            if (remindType.value === "every") {
                const every = Number(document.getElementById("remindEvery").value);
                if (!every || every < 1) { alert("Укажите частоту"); return; }
                task.remindMode = "every";
                task.every = every;
            } else {
                const days = Array.from(document.querySelectorAll("#weekdaysBlock input:checked"))
                    .map(ch => Number(ch.value));
                if (days.length === 0) { alert("Выберите хотя бы один день"); return; }
                task.remindMode = "weekdays";
                task.weekdays = days;
            }
        }
        
        const tasks = loadTasks();
        tasks.push(task);
        saveTasks(tasks);
        
        document.getElementById("title").value = "";
        if (addSection.style.display === "block") {
            addSection.style.display = "none";
            document.getElementById("accordionArrow").textContent = "+";
        }
        render();
    };
    
    window.toggleTask = function(id) {
        const tasks = loadTasks();
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        
        if (isCompleted(task, viewDate)) {
            task.completedDates = task.completedDates.filter(d => d !== viewDate);
        } else {
            task.completedDates.push(viewDate);
        }
        saveTasks(tasks);
        render();
    };
    
    window.deleteTask = function(id) {
        const tasks = loadTasks().filter(t => t.id !== id);
        saveTasks(tasks);
        render();
    };
    
    window.editTask = function(id) {
        const tasks = loadTasks();
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        
        const newTitle = prompt("Новое название:", task.title);
        if (newTitle !== null && newTitle.trim()) task.title = newTitle.trim();
        
        if (task.type === "daily") {
            const newStart = prompt("Новая дата начала (ГГГГ-ММ-ДД):", task.startDate);
            const newEnd = prompt("Новая дата конца (ГГГГ-ММ-ДД):", task.endDate);
            if (newStart) task.startDate = newStart;
            if (newEnd) task.endDate = newEnd;
        }
        
        if (task.type === "remind") {
            const newStart = prompt("Новая дата старта:", task.startDate);
            if (newStart) task.startDate = newStart;
            if (task.remindMode === "every") {
                const newEvery = prompt("Новая частота (дней):", task.every);
                if (newEvery) task.every = Number(newEvery);
            } else {
                const newDays = prompt("Дни недели (0-вс,1-пн... через запятую):", task.weekdays.join(","));
                if (newDays) task.weekdays = newDays.split(",").map(x => Number(x.trim()));
            }
        }
        
        saveTasks(tasks);
        render();
    };
    
    function renderTask(task) {
        const done = isCompleted(task, viewDate);
        const taskDiv = document.createElement("div");
        taskDiv.className = "task-card";
        
        let periodText = "";
        if (task.type === "daily") {
            periodText = `${formatDate(task.startDate)}–${formatDate(task.endDate)}`;
        } else if (task.type === "remind") {
            if (task.remindMode === "every") {
                periodText = `Каждые ${task.every} дн.`;
            } else {
                const names = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
                periodText = task.weekdays ? task.weekdays.map(d => names[d]).join(", ") : "";
            }
        }
        
        const streak = calculateStreak(task, viewDate);
        const showPeriod = task.type === "daily" ? task.showPeriod : true;
        
        taskDiv.innerHTML = `
            <div class="task-left">
                <button class="check-btn ${done ? "done" : ""}" onclick="window.toggleTask(${task.id})">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="task-info">
                    <div class="task-title ${done ? "done" : ""}">${escapeHtml(task.title)}</div>
                    <div class="task-meta">
                        <span class="period" style="${showPeriod ? "" : "display:none"}">${periodText}</span>
                        ${streak > 0 ? `<span class="badge">🔥 стрик ${streak}</span>` : ""}
                    </div>
                </div>
            </div>
            <div class="task-actions">
                <button class="action-btn" onclick="window.editTask(${task.id})">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M3 21h4l12-12-4-4L3 17v4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M14 6l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="action-btn" onclick="window.deleteTask(${task.id})">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M6 6L18 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        `;
        
        return taskDiv;
    }
    
    function renderSection(section, title, tasks) {
        const total = tasks.length;
        const done = tasks.filter(t => isCompleted(t, viewDate)).length;
        
        const box = document.createElement("div");
        box.className = "sectionBox";
        
        box.innerHTML = `
            <div class="sectionHeader">
                <div class="left">
                    <h3>${title}</h3>
                    <div class="statusBox">${done}/${total} выполнено</div>
                </div>
                <button class="toggle" data-section="${section}">${sectionsState[section] ? "Развернуть" : "Свернуть"}</button>
            </div>
            <div class="sectionContent" style="display: ${sectionsState[section] ? "none" : "block"}"></div>
        `;
        
        const content = box.querySelector(".sectionContent");
        tasks.forEach(t => content.appendChild(renderTask(t)));
        
        const toggleBtn = box.querySelector(".toggle");
        toggleBtn.onclick = () => {
            sectionsState[section] = !sectionsState[section];
            saveSectionsState();
            render();
        };
        
        return box;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }
    
    function render() {
        loadSectionsState();
        
        viewDateDisplay.textContent = formatDate(viewDate);
        datePicker.value = viewDate;
        
        const tasks = loadTasks();
        const dailyTasks = tasks.filter(t => t.type === "daily" && isTaskForDay(t, viewDate));
        const onceTasks = tasks.filter(t => t.type === "once" && isTaskForDay(t, viewDate));
        const remindTasks = tasks.filter(t => t.type === "remind" && isTaskForDay(t, viewDate));
        
        const total = dailyTasks.length + onceTasks.length + remindTasks.length;
        const done = tasks.filter(t => isTaskForDay(t, viewDate) && isCompleted(t, viewDate)).length;
        const percent = total === 0 ? 0 : Math.round((done / total) * 100);
        
        totalTasksEl.textContent = total;
        doneTasksEl.textContent = done;
        progressEl.textContent = `${percent}%`;
        progressBarEl.style.width = `${percent}%`;
        
        onceSection.innerHTML = "";
        dailySection.innerHTML = "";
        remindSection.innerHTML = "";
        
        if (onceTasks.length) onceSection.appendChild(renderSection("once", "Задачи на день", onceTasks));
        if (dailyTasks.length) dailySection.appendChild(renderSection("daily", "Ежедневные", dailyTasks));
        if (remindTasks.length) remindSection.appendChild(renderSection("remind", "Напоминания", remindTasks));
        
        if (total === 0) {
            dailySection.innerHTML = '<div class="empty-message">На этот день задач нет 🎉</div>';
        }
    }
    
    window.changeDay = function(delta) {
        const d = new Date(viewDate + "T00:00:00");
        d.setDate(d.getDate() + delta);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        viewDate = `${y}-${m}-${day}`;
        render();
    };
    
    window.goToday = function() {
        viewDate = getMskToday();
        render();
    };
    
    window.openDatePicker = function() {
        if (datePicker.showPicker) {
            datePicker.showPicker();
        } else {
            datePicker.click();
        }
    };
    
    window.selectDate = function(value) {
        if (value) {
            viewDate = value;
            render();
        }
    };
    
    window.toggleAddSection = function() {
        const addSectionEl = document.getElementById("addSection");
        const arrow = document.getElementById("accordionArrow");
        if (addSectionEl.style.display === "block") {
            addSectionEl.style.display = "none";
            arrow.textContent = "+";
        } else {
            addSectionEl.style.display = "block";
            arrow.textContent = "−";
        }
    };
    
    // Обработчики типов
    typeSelect.addEventListener("change", () => {
        datesDiv.style.display = typeSelect.value === "daily" ? "block" : "none";
        remindDiv.style.display = typeSelect.value === "remind" ? "block" : "none";
    });
    
    remindType.addEventListener("change", () => {
        const type = remindType.value;
        remindEveryBlock.style.display = type === "every" ? "block" : "none";
        weekdaysBlock.style.display = type === "weekdays" ? "block" : "none";
        if (type === "weekdays") {
            document.getElementById("remindStart").value = getMskToday();
        }
    });
    
    // init
    render();
</script>
</body>
</html>
